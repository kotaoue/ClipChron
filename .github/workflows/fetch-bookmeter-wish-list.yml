name: Fetch Bookmeter wish list

on:
  schedule:
    - cron: '23 17 * * *'  # 毎日 02:23 JST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-bookmeter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get current date
        id: date
        run: echo "yearmonth=$(date +'%Y-%m')" >> $GITHUB_OUTPUT

      - name: Fetch Bookmeter wish list
        uses: kotaoue/fetch-bookmeter@v1
        with:
          user-id: ${{ secrets.BOOKMETER_USER_ID }}
          output: fetched/bookmeter-wish-list.json

      - name: Copy to monthly snapshot
        run: cp fetched/bookmeter-wish-list.json fetched/bookmeter-wish-${{ steps.date.outputs.yearmonth }}.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fetched/bookmeter-wish-list.json fetched/bookmeter-wish-${{ steps.date.outputs.yearmonth }}.json
          git diff --staged --quiet || git commit -m "chore: update bookmeter wish list"
          git push
